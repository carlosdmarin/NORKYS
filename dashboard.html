<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <title>Dashboard - Panel Administrativo</title>
  </head>
  <body>
    <!--SIDE BAR-->
    <section class="topbar">
      <div class="title-business">
        <span> NORKYS SAC</span>
      </div>
      <div class="btn-menu">
        <button class="hamburguer">
          <i class="fa-solid fa-bars"></i>
        </button>
      </div>
    </section>
    <!--OVERLAY JUNTO CON EL NAVBAR-->
    <!--Sidebar: Es el menu / la barra lateral Izquierda-->
    <section class="overlay"></section>

    <aside class="sidebar">
      <div class="sidebar-logo">Dashboard</div>
      <ul>
        <li>
          <a href="#" class="activo" id="activo">
            <i class="fa-solid fa-house"></i>
            <span>Inicio</span>
          </a>
        </li>
        <li>
          <a href="#">
            <i class="fa-solid fa-folder"></i>
            <span>Reportes</span>
          </a>
        </li>
      </ul>
    </aside>
  </body>
</html>
